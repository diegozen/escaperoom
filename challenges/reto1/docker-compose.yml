services:
  reto1:
    build: .
    container_name: escape_reto1
    ports:
      - "2201:22"
    environment:
      - TZ=Europe/Madrid
      - SSH_USER=jugador
      - SSH_PASS=password123
      - FLAG=r3c0n_secret
    cap_add:
      - NET_ADMIN # Permite usar iptables dentro del contenedor
    networks:
      - red_ssh
      - red_interna

networks:
  red_ssh:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.100.1.0/24
  red_interna:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.100.2.0/24